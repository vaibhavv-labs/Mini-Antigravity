<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mini Antigravity - AI Agent Hub</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #0a0a0f; color: #e0e0e0; height: 100vh; display: flex; flex-direction: column; }

        .header { background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%); padding: 15px 25px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid #2a2a4a; }
        .header h1 { font-size: 1.4em; color: #00d4ff; }
        .header .status { font-size: 0.85em; padding: 5px 12px; border-radius: 15px; background: #ff4444; color: white; }
        .header .status.connected { background: #00c853; }

        .main { display: flex; flex: 1; overflow: hidden; }

        .sidebar { width: 220px; background: #12121f; border-right: 1px solid #2a2a4a; padding: 15px; overflow-y: auto; }
        .sidebar h3 { color: #00d4ff; margin-bottom: 10px; font-size: 0.9em; text-transform: uppercase; }
        .agent-btn { width: 100%; padding: 10px; margin-bottom: 8px; background: #1a1a2e; border: 1px solid #3a3a5a; border-radius: 8px; color: #e0e0e0; cursor: pointer; text-align: left; transition: all 0.2s; }
        .agent-btn:hover { background: #2a2a4a; border-color: #00d4ff; }
        .agent-btn.active { background: #00d4ff22; border-color: #00d4ff; color: #00d4ff; }
        .agent-btn .name { font-weight: bold; display: block; }
        .agent-btn .desc { font-size: 0.75em; color: #888; margin-top: 3px; }

        .chat-area { flex: 1; display: flex; flex-direction: column; }
        .messages { flex: 1; overflow-y: auto; padding: 20px; }
        .message { margin-bottom: 15px; max-width: 80%; }
        .message.user { margin-left: auto; }
        .message .bubble { padding: 12px 16px; border-radius: 12px; line-height: 1.5; white-space: pre-wrap; word-wrap: break-word; }
        .message.user .bubble { background: #00d4ff22; border: 1px solid #00d4ff; }
        .message.agent .bubble { background: #1a1a2e; border: 1px solid #3a3a5a; }
        .message .meta { font-size: 0.7em; color: #666; margin-top: 5px; }
        .message.user .meta { text-align: right; }

        .input-area { padding: 15px 20px; background: #12121f; border-top: 1px solid #2a2a4a; display: flex; gap: 10px; }
        .input-area input { flex: 1; padding: 12px; background: #1a1a2e; border: 1px solid #3a3a5a; border-radius: 8px; color: #e0e0e0; font-size: 1em; }
        .input-area input:focus { outline: none; border-color: #00d4ff; }
        .input-area button { padding: 12px 24px; background: #00d4ff; color: #0a0a0f; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; transition: background 0.2s; }
        .input-area button:hover { background: #00b8d4; }
        .input-area button:disabled { background: #3a3a5a; cursor: not-allowed; }

        .api-modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); display: flex; align-items: center; justify-content: center; z-index: 100; }
        .api-modal.hidden { display: none; }
        .api-modal .box { background: #1a1a2e; padding: 30px; border-radius: 12px; border: 1px solid #3a3a5a; width: 400px; }
        .api-modal h2 { color: #00d4ff; margin-bottom: 15px; }
        .api-modal input { width: 100%; padding: 12px; background: #0a0a0f; border: 1px solid #3a3a5a; border-radius: 8px; color: #e0e0e0; margin-bottom: 15px; }
        .api-modal .btn-row { display: flex; gap: 10px; }
        .api-modal button { flex: 1; padding: 10px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }
        .api-modal .connect-btn { background: #00d4ff; color: #0a0a0f; }
        .api-modal .skip-btn { background: #3a3a5a; color: #e0e0e0; }

        .typing { display: inline-block; }
        .typing span { animation: blink 1.4s infinite both; }
        .typing span:nth-child(2) { animation-delay: 0.2s; }
        .typing span:nth-child(3) { animation-delay: 0.4s; }
        @keyframes blink { 0%, 80%, 100% { opacity: 0; } 40% { opacity: 1; } }
    </style>
</head>
<body>
    <!-- API Key Modal -->
    <div class="api-modal" id="apiModal">
        <div class="box">
            <h2>Connect Gemini AI</h2>
            <p style="margin-bottom: 15px; color: #888;">Enter your Google Gemini API key to enable AI agents</p>
            <input type="text" id="apiKeyInput" placeholder="Enter your Gemini API key..." />
            <div class="btn-row">
                <button class="skip-btn" onclick="skipApi()">Skip (Demo Mode)</button>
                <button class="connect-btn" onclick="connectApi()">Connect</button>
            </div>
            <p id="apiStatus" style="margin-top: 10px; font-size: 0.85em;"></p>
        </div>
    </div>

    <!-- Header -->
    <div class="header">
        <h1>Mini Antigravity</h1>
        <span class="status" id="statusBadge">Disconnected</span>
    </div>

    <div class="main">
        <!-- Sidebar -->
        <div class="sidebar">
            <h3>Agents</h3>
            <div id="agentList"></div>

            <h3 style="margin-top: 20px;">Tools</h3>
            <div id="toolList" style="font-size: 0.8em; color: #888;"></div>
        </div>

        <!-- Chat -->
        <div class="chat-area">
            <div class="messages" id="messages">
                <div class="message agent">
                    <div class="bubble">Welcome to Mini Antigravity! Select an agent from the sidebar and start chatting.</div>
                    <div class="meta">System</div>
                </div>
            </div>
            <div class="input-area">
                <input type="text" id="userInput" placeholder="Type your message..." onkeypress="if(event.key==='Enter')sendMessage()" />
                <button id="sendBtn" onclick="sendMessage()">Send</button>
            </div>
        </div>
    </div>

    <script>
        let selectedAgent = "engineer";
        let isConnected = false;

        // Load agents
        async function loadAgents() {
            const res = await fetch("/api/agents");
            const data = await res.json();
            const list = document.getElementById("agentList");
            list.innerHTML = data.agents.map(a => `
                <button class="agent-btn ${a.name === selectedAgent ? 'active' : ''}" onclick="selectAgent('${a.name}')">
                    <span class="name">${a.name}</span>
                    <span class="desc">${a.description}</span>
                </button>
            `).join("");
        }

        // Load tools
        async function loadTools() {
            const res = await fetch("/api/tools");
            const data = await res.json();
            document.getElementById("toolList").innerHTML = data.tools.map(t => `<div>${t.name}</div>`).join("");
        }

        function selectAgent(name) {
            selectedAgent = name;
            document.querySelectorAll(".agent-btn").forEach(b => b.classList.remove("active"));
            event.target.closest(".agent-btn").classList.add("active");
            addMessage("agent", `Switched to ${name} agent. How can I help?`);
        }

        function addMessage(type, text) {
            const div = document.getElementById("messages");
            const msg = document.createElement("div");
            msg.className = `message ${type}`;
            msg.innerHTML = `<div class="bubble">${escapeHtml(text)}</div><div class="meta">${type === 'user' ? 'You' : selectedAgent}</div>`;
            div.appendChild(msg);
            div.scrollTop = div.scrollHeight;
        }

        function addTyping() {
            const div = document.getElementById("messages");
            const msg = document.createElement("div");
            msg.className = "message agent";
            msg.id = "typing";
            msg.innerHTML = `<div class="bubble"><span class="typing"><span>.</span><span>.</span><span>.</span></span></div>`;
            div.appendChild(msg);
            div.scrollTop = div.scrollHeight;
        }

        function removeTyping() {
            const el = document.getElementById("typing");
            if (el) el.remove();
        }

        function escapeHtml(text) {
            const div = document.createElement("div");
            div.textContent = text;
            return div.innerHTML;
        }

        async function sendMessage() {
            const input = document.getElementById("userInput");
            const msg = input.value.trim();
            if (!msg) return;

            addMessage("user", msg);
            input.value = "";

            if (!isConnected) {
                addMessage("agent", "[Demo Mode] Connect a Gemini API key for real AI responses.");
                return;
            }

            addTyping();
            document.getElementById("sendBtn").disabled = true;

            try {
                const res = await fetch("/api/chat", {
                    method: "POST",
                    headers: {"Content-Type": "application/json"},
                    body: JSON.stringify({agent: selectedAgent, message: msg})
                });
                const data = await res.json();
                removeTyping();
                addMessage("agent", data.response || "No response");
            } catch(e) {
                removeTyping();
                addMessage("agent", "[Error] " + e.message);
            }

            document.getElementById("sendBtn").disabled = false;
        }

        async function connectApi() {
            const key = document.getElementById("apiKeyInput").value.trim();
            if (!key) {
                document.getElementById("apiStatus").innerHTML = '<span style="color: red;">Please enter an API key</span>';
                return;
            }

            document.getElementById("apiStatus").innerHTML = '<span style="color: yellow;">Connecting...</span>';

            try {
                const res = await fetch("/api/connect", {
                    method: "POST",
                    headers: {"Content-Type": "application/json"},
                    body: JSON.stringify({api_key: key})
                });
                const data = await res.json();

                if (data.success) {
                    document.getElementById("apiStatus").innerHTML = '<span style="color: green;">Connected!</span>';
                    setTimeout(() => {
                        document.getElementById("apiModal").classList.add("hidden");
                        document.getElementById("statusBadge").textContent = "Connected";
                        document.getElementById("statusBadge").classList.add("connected");
                        isConnected = true;
                        addMessage("agent", "Gemini AI connected! I'm ready to help. What would you like to build?");
                    }, 500);
                } else {
                    document.getElementById("apiStatus").innerHTML = `<span style="color: red;">${data.message}</span>`;
                }
            } catch(e) {
                document.getElementById("apiStatus").innerHTML = `<span style="color: red;">${e.message}</span>`;
            }
        }

        function skipApi() {
            document.getElementById("apiModal").classList.add("hidden");
            addMessage("agent", "Running in demo mode. Agents will respond with simulated output.");
        }

        // Init
        loadAgents();
        loadTools();
    </script>
</body>
</html>
